version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - gosec
  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
    govet:
      enable-all: false
    staticcheck:
      checks:
        - "all"
  exclusions:
    rules:
      # WAL and chunk servers intentionally open files via variable paths
      # (always filepath.Join + filepath.Clean constructed).
      - linters:
          - gosec
        text: "G304:"
      # Test files are exempt from gosec — they construct paths from t.TempDir()
      # and use small int→byte conversions with no production security impact.
      - path: '_test\.go'
        linters:
          - gosec
