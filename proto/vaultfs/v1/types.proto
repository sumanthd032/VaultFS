syntax = "proto3";

// Package vaultfs.v1 defines the shared message types and service contracts
// for the VaultFS distributed filesystem.
package vaultfs.v1;

// NodeInfo identifies a chunk server by its stable ID and dial address.
message NodeInfo {
  string node_id = 1;
  string address = 2;
}

// FileInfo is the metadata for a file or directory in the namespace.
message FileInfo {
  string path = 1;
  bool is_dir = 2;
  int64 size = 3;
  // chunk_ids lists the file's chunks in order. Each ID is a content address
  // (hex-encoded SHA-256 of the chunk bytes).
  repeated string chunk_ids = 4;
  uint32 mode = 5;
  int64 created_at_unix = 6;
  int64 updated_at_unix = 7;
}

// ChunkLocation maps a chunk to the chunk servers that hold (or should hold) a
// replica. By convention nodes[0] is the primary.
message ChunkLocation {
  string chunk_id = 1;
  repeated NodeInfo nodes = 2;
}

// Lease grants a primary chunk server the exclusive right to coordinate writes
// to a chunk until expiry.
message Lease {
  string chunk_id = 1;
  string holder = 2;
  int64 expiry_unix = 3;
}
