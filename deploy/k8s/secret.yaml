# mTLS material for the cluster, mounted read-only at /etc/vaultfs/certs.
#
# This file is a TEMPLATE. It intentionally ships without key material; never
# commit real private keys. Populate the Secret from the dev PKI for local
# testing, or use cert-manager to issue and rotate certificates in production.
#
# Generate the dev certs and create the Secret directly from them:
#
#   make certs
#   kubectl create secret generic vaultfs-certs -n vaultfs \
#     --from-file=ca.crt=deploy/certs/ca.crt \
#     --from-file=master.crt=deploy/certs/master.crt \
#     --from-file=master.key=deploy/certs/master.key \
#     --from-file=chunkserver.crt=deploy/certs/chunkserver.crt \
#     --from-file=chunkserver.key=deploy/certs/chunkserver.key
#
# Applying this template as-is creates an empty Secret of the right shape so the
# manifests resolve; replace the values before expecting a working cluster.
apiVersion: v1
kind: Secret
metadata:
  name: vaultfs-certs
  namespace: vaultfs
  labels:
    app.kubernetes.io/name: vaultfs
    app.kubernetes.io/part-of: vaultfs
type: Opaque
stringData:
  ca.crt: REPLACE_WITH_CA_CERT_PEM
  master.crt: REPLACE_WITH_MASTER_CERT_PEM
  master.key: REPLACE_WITH_MASTER_KEY_PEM
  chunkserver.crt: REPLACE_WITH_CHUNKSERVER_CERT_PEM
  chunkserver.key: REPLACE_WITH_CHUNKSERVER_KEY_PEM
