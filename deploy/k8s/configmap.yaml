# Cluster-wide, non-secret configuration shared by every VaultFS pod.
#
# Topology is expressed with StatefulSet DNS: each pod gets a stable name
# <statefulset>-<ordinal> resolvable as
# <pod>.<headless-service>.<namespace>.svc.cluster.local. The master receives
# the full master list as Raft peers and drops its own entry at startup, so a
# single uniform pod spec works for all replicas.
apiVersion: v1
kind: ConfigMap
metadata:
  name: vaultfs-config
  namespace: vaultfs
  labels:
    app.kubernetes.io/name: vaultfs
    app.kubernetes.io/part-of: vaultfs
data:
  VAULTFS_REPLICATION: "3"
  VAULTFS_CA: /etc/vaultfs/certs/ca.crt
  VAULTFS_RAFT_PEERS: "vaultfs-master-0.vaultfs-master:9200,vaultfs-master-1.vaultfs-master:9200,vaultfs-master-2.vaultfs-master:9200"
  VAULTFS_CHUNKSERVERS: "vaultfs-chunkserver-0@vaultfs-chunkserver-0.vaultfs-chunkserver:9100,vaultfs-chunkserver-1@vaultfs-chunkserver-1.vaultfs-chunkserver:9100,vaultfs-chunkserver-2@vaultfs-chunkserver-2.vaultfs-chunkserver:9100"
