# Two services for the master cluster:
#
#  - vaultfs-master is headless (clusterIP None). It gives each StatefulSet pod
#    a stable DNS name used for Raft peer discovery and for per-pod metrics
#    scraping. It publishes endpoints even before pods are Ready so masters can
#    reach each other while the cluster is still forming a quorum.
#  - vaultfs-master-client is a normal ClusterIP that load-balances client gRPC
#    traffic across whichever masters are Ready.
apiVersion: v1
kind: Service
metadata:
  name: vaultfs-master
  namespace: vaultfs
  labels:
    app.kubernetes.io/name: vaultfs
    app.kubernetes.io/component: master
    app.kubernetes.io/part-of: vaultfs
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: vaultfs
    app.kubernetes.io/component: master
  ports:
    - name: grpc
      port: 9000
    - name: raft
      port: 9200
    - name: metrics
      port: 9001
---
apiVersion: v1
kind: Service
metadata:
  name: vaultfs-master-client
  namespace: vaultfs
  labels:
    app.kubernetes.io/name: vaultfs
    app.kubernetes.io/component: master
    app.kubernetes.io/part-of: vaultfs
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: vaultfs
    app.kubernetes.io/component: master
  ports:
    - name: grpc
      port: 9000
      targetPort: grpc
