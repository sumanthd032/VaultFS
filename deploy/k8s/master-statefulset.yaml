# The master cluster runs as a StatefulSet rather than a Deployment: Raft needs
# stable network identities so each node can be addressed as a peer. The
# headless service vaultfs-master gives every pod a predictable DNS name, and
# podManagementPolicy Parallel starts all replicas at once so they can form a
# quorum without an ordering deadlock.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vaultfs-master
  namespace: vaultfs
  labels:
    app.kubernetes.io/name: vaultfs
    app.kubernetes.io/component: master
    app.kubernetes.io/part-of: vaultfs
spec:
  serviceName: vaultfs-master
  replicas: 3
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: vaultfs
      app.kubernetes.io/component: master
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vaultfs
        app.kubernetes.io/component: master
        app.kubernetes.io/part-of: vaultfs
    spec:
      securityContext:
        runAsNonRoot: false
        fsGroup: 65532
      containers:
        - name: master
          image: ghcr.io/sumanthd032/vaultfs-master:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: vaultfs-config
          env:
            - name: VAULTFS_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: VAULTFS_LISTEN
              value: ":9000"
            - name: VAULTFS_RAFT_LISTEN
              value: ":9200"
            - name: VAULTFS_METRICS_ADDR
              value: ":9001"
            - name: VAULTFS_DATA_DIR
              value: /var/lib/vaultfs/meta
            - name: VAULTFS_CERT
              value: /etc/vaultfs/certs/master.crt
            - name: VAULTFS_KEY
              value: /etc/vaultfs/certs/master.key
          ports:
            - name: grpc
              containerPort: 9000
            - name: raft
              containerPort: 9200
            - name: metrics
              containerPort: 9001
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: certs
              mountPath: /etc/vaultfs/certs
              readOnly: true
            - name: meta
              mountPath: /var/lib/vaultfs/meta
      volumes:
        - name: certs
          secret:
            secretName: vaultfs-certs
  volumeClaimTemplates:
    - metadata:
        name: meta
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
