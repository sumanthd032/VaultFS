# Load any dashboard JSON dropped into the dashboards directory. The VaultFS
# operational dashboard is added in Step 6.
apiVersion: 1

providers:
  - name: VaultFS
    orgId: 1
    folder: VaultFS
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
