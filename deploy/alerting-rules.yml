# Prometheus alerting rules for the VaultFS cluster.
#
# Loaded by Prometheus via rule_files in prometheus.yml. Each alert fires on a
# condition that warrants operator attention: slow replication, an unstable
# Raft leader, or a chunk server that has stopped heartbeating.
groups:
  - name: vaultfs
    rules:
      - alert: VaultFSReplicationLagHigh
        expr: vaultfs_replication_lag_seconds > 5
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Replication lag high on {{ $labels.node_id }}"
          description: "Forwarding chunks to {{ $labels.node_id }} has taken over 5s for more than 1 minute (current {{ $value }}s)."

      - alert: VaultFSLeaderElectionFrequent
        expr: increase(vaultfs_raft_elections_total[5m]) > 3
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Frequent Raft elections on {{ $labels.instance }}"
          description: "{{ $labels.instance }} has started more than 3 elections in 5 minutes, indicating leadership instability."

      - alert: VaultFSChunkServerDown
        expr: increase(vaultfs_heartbeat_missed_total[5m]) > 0
        for: 15s
        labels:
          severity: critical
        annotations:
          summary: "Chunk server {{ $labels.node_id }} declared dead"
          description: "{{ $labels.node_id }} missed heartbeats and was evicted from the chunk map; its replicas are being restored."
